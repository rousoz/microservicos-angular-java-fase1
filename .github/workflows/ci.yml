name: Java & Angular CI

on:
  push:
    branches: [ main ]

jobs:
  build-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      #- name: Build with Maven
      #  run: mvn clean package -DskipTests
      - name: Test and Build with Maven
        run: mvn verify  # <-- Mudamos aqui para rodar testes

  build-angular:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      #  working-directory: ./frontend
      #- name: Build Angular
      #  run: npm run build
      #  working-directory: ./frontend
        working-directory: ./frontend
      - name: Run Angular Tests  # <-- Novo passo de teste
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: ./frontend
      - name: Build Angular
        run: npm run build
        working-directory: ./frontend      


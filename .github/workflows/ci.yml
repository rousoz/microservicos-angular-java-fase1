# Trecho do build Java
    steps:
      - uses: actions/checkout@v4
      - name: Build with Maven
        run: mvn clean package -DskipTests # O Maven corre da raiz porque temos o pom pai lá

# Trecho do build Angular
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend  # <--- IMPORTANTE: aponta para a nova pasta
      - name: Build Angular
        run: npm run build
        working-directory: ./frontend  # <--- IMPORTANTE: aponta para a nova pasta

name: CI/CD Pipeline Otimizado

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  # Job de Testes Java (Independente)
  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: mvn test

  # Job de Testes Angular (Roda ao mesmo tempo que o Java)
  test-angular:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - run: npm ci # 'npm ci' é mais rápido e limpo para CI que 'npm install'
        working-directory: ./frontend
      - run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: ./frontend

  # Build e Push (Roda assim que OS DOIS testes passarem)
  build-and-push:
    needs: [test-java, test-angular]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Nomes exatos dos serviços para as tags
        service: [frontend, catalogo-service, inventario-service]
    steps:
      - uses: actions/checkout@v4

      # Necessário para usar o cache avançado (type=gha)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # Se for frontend, o contexto é ./frontend. Se não, é a raiz .
          context: ${{ matrix.service == 'frontend' && './frontend' || '.' }}
          # Localização exata do Dockerfile baseada no seu docker-compose
          file: ${{ matrix.service == 'frontend' && './frontend/Dockerfile' || format('./{0}/Dockerfile', matrix.service) }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


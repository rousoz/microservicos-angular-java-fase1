name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Testes (Garante que o código está bom)
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Java Tests
        run: mvn test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Angular Deps
        run: npm install
        working-directory: ./frontend
      - name: Run Angular Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: ./frontend

  # Job 2: Build e Push (Só corre se os testes passarem)
  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Build and push Catalogo
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./catalogo-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/catalogo-service:latest

      - name: Build and push Inventario
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./inventario-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/inventario-service:latest

